name: cloudpilot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudpilot}
      POSTGRES_DB: ${POSTGRES_DB:-cloudpilot}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cloudpilot} -d ${POSTGRES_DB:-cloudpilot}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # One-shot: applies pending Prisma migrations, then exits. Every other
  # service that touches Postgres waits for this to *succeed*, not just
  # for postgres to be reachable — a reachable-but-unmigrated database is
  # not a state anything else should start against.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ['pnpm', 'prisma:migrate:deploy']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  # The Next.js app. This is also where the real Terraform sandbox runs
  # (lib/terraform/sandbox.ts, invoked from the LangGraph pipeline) — the
  # runtime image (see Dockerfile's `runner` stage) has a pinned Terraform
  # CLI installed. No Docker socket is mounted into this container, so
  # sandbox.ts's Docker-isolated execution path is unavailable here and it
  # automatically falls back to the host-binary path (network isolation
  # cannot be enforced in that mode — see Dockerfile's comment and
  # docs/phase-reports/PHASE_7_TERRAFORM_SANDBOX.md). This is a deliberate
  # security trade-off: mounting the Docker socket would grant
  # root-equivalent host access, which this hardening phase avoids by
  # default.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker-terraform:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ['pnpm', 'worker:terraform']
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
      REDIS_URL: redis://redis:6379
      TERRAFORM_WORKER_CONCURRENCY: ${TERRAFORM_WORKER_CONCURRENCY:-2}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "workers/terraform-worker" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker-simulation:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ['pnpm', 'worker:simulation']
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
      REDIS_URL: redis://redis:6379
      SIMULATION_WORKER_CONCURRENCY: ${SIMULATION_WORKER_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "workers/simulation-worker" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker-verification:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ['pnpm', 'worker:verification']
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
      REDIS_URL: redis://redis:6379
      VERIFICATION_WORKER_CONCURRENCY: ${VERIFICATION_WORKER_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "workers/verification-worker" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  worker-audit:
    build:
      context: .
      dockerfile: Dockerfile.worker
    command: ['pnpm', 'worker:audit']
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
      REDIS_URL: redis://redis:6379
      AUDIT_WORKER_CONCURRENCY: ${AUDIT_WORKER_CONCURRENCY:-8}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ['CMD-SHELL', 'pgrep -f "workers/audit-worker" || exit 1']
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres-data:
  redis-data:
