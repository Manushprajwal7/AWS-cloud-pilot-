name: cloudpilot

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cloudpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-cloudpilot}
      POSTGRES_DB: ${POSTGRES_DB:-cloudpilot}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-cloudpilot} -d ${POSTGRES_DB:-cloudpilot}']
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: applies pending Prisma migrations, then exits. Every other
  # service that touches Postgres waits for this to *succeed*, not just
  # for postgres to be reachable — a reachable-but-unmigrated database is
  # not a state anything else should start against.
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    command: ['pnpm', 'prisma:migrate:deploy']
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  # A real, local AWS API emulator — free, no real account, no real cost.
  # terraform apply (lib/terraform/sandbox.ts, allowNetwork: true) targets
  # this instead of real AWS whenever TERRAFORM_AWS_ENDPOINT is set (see
  # templates.ts's wrapWithProviderBlock), so apply can genuinely succeed
  # instead of always failing AWS authentication. EC2 is the only service
  # this app's Terraform templates currently generate resources for that
  # actually get applied end-to-end; the other four are enabled too since
  # LocalStack multiplexes every service through the one edge port anyway.
  localstack:
    image: localstack/localstack:latest
    restart: unless-stopped
    ports:
      - '${LOCALSTACK_PORT:-4566}:4566'
    environment:
      SERVICES: ec2,rds,ecs,lambda,elasticache,sts
    healthcheck:
      test: ['CMD', 'curl', '-sf', 'http://localhost:4566/_localstack/health']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 15s

  # The Next.js app. This is also where the real Terraform sandbox runs
  # (lib/terraform/sandbox.ts, invoked from the LangGraph pipeline) — the
  # runtime image (see Dockerfile's `runner` stage) has a pinned Terraform
  # CLI installed. No Docker socket is mounted into this container, so
  # sandbox.ts's Docker-isolated execution path is unavailable here and it
  # automatically falls back to the host-binary path (network isolation
  # cannot be enforced in that mode — see Dockerfile's comment and
  # docs/phase-reports/PHASE_7_TERRAFORM_SANDBOX.md). This is a deliberate
  # security trade-off: mounting the Docker socket would grant
  # root-equivalent host access, which this hardening phase avoids by
  # default.
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '${APP_PORT:-3000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-cloudpilot}:${POSTGRES_PASSWORD:-cloudpilot}@postgres:5432/${POSTGRES_DB:-cloudpilot}?schema=public
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
      MONITORING_CREDENTIALS_ENCRYPTION_KEY: ${MONITORING_CREDENTIALS_ENCRYPTION_KEY}
      TERRAFORM_AWS_ENDPOINT: http://localstack:4566
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      localstack:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "fetch('http://localhost:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  postgres-data:
